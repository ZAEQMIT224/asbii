<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BEYBLADE BURST — ULTIMATE ARENA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root {
  /* Cyberpunk Minimalist Palette */
  --cyan: #00f0ff; 
  --pink: #ff003c; 
  --purple: #b026ff; 
  --yellow: #fcee0a;
  --bg: #050507; 
  --panel: rgba(5, 7, 12, 0.65); /* Dark smoked glass */
  
  --fhud: 'Orbitron', sans-serif; 
  --fui: 'Rajdhani', sans-serif; 
  --fmono: 'Share Tech Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--fui);color:#fff;user-select:none;-webkit-user-select:none;touch-action:none}
canvas{display:block}
.screen{position:fixed;inset:0;display:none;opacity:0;transition:opacity .4s ease}
.screen.active{display:flex;opacity:1}

/* MINIMALIST GRID BG */
.grid-bg{
  position:fixed;inset:0;
  background-image: linear-gradient(rgba(0, 240, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;z-index:0;
}

/* HERO */
#hero-screen{flex-direction:column;align-items:center;background:radial-gradient(circle at 50% 50%, #0a0e17 0%, var(--bg) 80%)}
#hero-canvas{position:absolute;inset:0;width:100%;height:100%;cursor:pointer}
.hero-title{position:relative;z-index:10;text-align:center;margin-top:9vh;pointer-events:none}
/* Cyberpunk Glitch Text Shadow */
.hero-title h1{
  font-family:var(--fhud);font-size:clamp(26px,8vw,66px);font-weight:900;letter-spacing:.2em;color:#fff;
  text-shadow: 3px 0 var(--pink), -3px 0 var(--cyan);
  text-transform: uppercase;
}
.hero-title p{
  font-family:var(--fmono);font-size:clamp(11px,3vw,17px);letter-spacing:.5em;color:var(--cyan);margin-top:10px;
  background: #000; display: inline-block; padding: 4px 12px; border-left: 2px solid var(--yellow);
}
#click-hint{position:fixed;bottom:9vh;left:50%;transform:translateX(-50%);font-family:var(--fmono);font-size:clamp(11px,3.2vw,14px);letter-spacing:.3em;color:var(--cyan);opacity:0;pointer-events:none;text-align:center;white-space:nowrap}
.hint-vis{animation:hpulse 1.5s ease-in-out infinite}
@keyframes hpulse{0%,100%{opacity:.3}50%{opacity:1}}

/* FLASH */
#flash{position:fixed;inset:0;background:#fff;pointer-events:none;z-index:900;opacity:0;transition:opacity .08s}

/* 3D PARTS SCREEN */
#parts-screen{flex-direction:column;align-items:center;}
#parts-3d-container{position:absolute;inset:0;width:100%;height:100%;cursor:grab}
#parts-3d-container:active{cursor:grabbing}

/* SMOKED LIQUID GLASS + CYBERPUNK ANGLES */
.glass-panel {
  background: var(--panel); 
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(0, 240, 255, 0.15); 
  border-top: 2px solid var(--cyan);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); 
  border-radius: 0; /* Minimalist sharp edges */
}

/* SLEEK POINTERS UI */
.pointer-container { position: absolute; z-index: 40; display: flex; align-items: center; cursor: pointer; transition: transform 0.2s; }
.pointer-container:hover { transform: scale(1.05); }
.pointer-text { 
  font-family: var(--fmono); font-size: 11px; letter-spacing: 0.2em; color: var(--cyan); 
  background: #000; border: 1px solid var(--cyan); padding: 4px 10px; 
  white-space: nowrap; text-transform: uppercase;
}
.pointer-line { height: 1px; background: var(--cyan); width: 40px; }
.pointer-dot { width: 5px; height: 5px; background: var(--cyan); }

#ptr-layer { top: 32%; left: 10%; }
#ptr-disc { top: 48%; right: 10%; flex-direction: row-reverse; }
#ptr-driver { top: 64%; left: 15%; }

/* DYNAMIC STAT DETAILS PANEL */
#part-details-panel {
  position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%); width: min(92vw, 400px);
  padding: 24px; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 100;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  clip-path: polygon(15px 0, 100% 0, 100% 100%, 0 100%, 0 15px); /* Angled top-left corner */
}
#part-details-panel.open { bottom: 80px; }
#close-details { position: absolute; top: 12px; right: 15px; background: none; border: none; color: rgba(255,255,255,0.5); font-family: var(--fmono); font-size: 14px; cursor: pointer; transition: 0.2s; }
#close-details:hover { color: var(--pink); }

.selector-controls { display: flex; align-items: center; gap: 20px; margin-bottom: 15px; width: 100%; justify-content: center; }
.sel-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 18px; cursor: pointer; transition: 0.2s; padding: 4px 12px; clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px); }
.sel-btn:hover { background: var(--cyan); color: #000; border-color: var(--cyan); }
.part-name { font-family: var(--fhud); font-size: 15px; width: 160px; text-align: center; color: #fff; letter-spacing: 0.1em; }
.element-badge { font-family: var(--fmono); font-size: 10px; letter-spacing: 0.15em; padding: 2px 8px; margin-top: 4px; display: inline-block; background: #000; border: 1px solid; }

/* Flat Minimalist Stat Bars */
.srow{display:flex;align-items:center;gap:12px;margin-bottom:6px; width: 100%;}
.slabel{font-size:10px;width:60px;color:rgba(255,255,255,.5);font-family:var(--fmono);letter-spacing:.1em; text-align: right;}
.sbar{flex:1;height:4px;background:rgba(255,255,255,.05); position: relative;}
.sfill{height:100%; transition: width 0.3s ease; position: absolute; left: 0;}

#parts-btns{position:fixed;bottom:20px;left:0;right:0;display:none;justify-content:center;gap:14px;z-index:100}
#parts-btns.vis{display:flex}

/* CYBERPUNK BUTTONS */
.nbtn {
  font-family: var(--fmono); font-size: clamp(11px, 2.8vw, 14px); font-weight: 700; letter-spacing: .2em; 
  padding: 14px 28px; background: rgba(0,0,0,0.8); cursor: pointer; text-transform: uppercase; transition: all .2s; 
  border: 1px solid; border-radius: 0;
  clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
}
.nb-blue{color:var(--cyan);border-color:var(--cyan)}
.nb-blue:active, .nb-blue:hover{background:var(--cyan); color:#000; box-shadow: 0 0 15px rgba(0,240,255,0.4);}
.nb-gold{color:var(--yellow);border-color:var(--yellow)}
.nb-gold:active, .nb-gold:hover{background:var(--yellow); color:#000; box-shadow: 0 0 15px rgba(252,238,10,0.4);}

/* BATTLE */
#battle-screen{flex-direction:column;background:#030304}
#battle-canvas{position:absolute;inset:0;width:100%;height:100%}
#bhud{position:fixed;top:0;left:0;right:0;display:flex;align-items:flex-start;justify-content:space-between;padding:14px;z-index:10;pointer-events:none;gap:8px}

.pcard{
  background:var(--panel); padding:10px 14px; backdrop-filter:blur(10px); min-width:120px;
  border-bottom: 2px solid; border-radius: 0; clip-path: polygon(0 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%);
}
.cblue { border-color: var(--cyan); } .cred { border-color: var(--pink); }
.pcard .cname{font-family:var(--fmono);font-size:11px;letter-spacing:.2em;margin-bottom:8px;display:flex;justify-content:space-between}

.hpbar,.spbar{width:100%;height:3px;background:rgba(255,255,255,.08);margin-bottom:6px}
.hpfill{height:100%; transition:width .25s; background: var(--cyan);}
.spfill{height:100%; background: var(--yellow); transition:width .1s}
.blabel{font-family:var(--fmono);font-size:8px;color:rgba(255,255,255,.4);letter-spacing:.1em; margin-bottom: 2px;}

#timer{font-family:var(--fmono);font-size:clamp(17px,5vw,27px);color:#fff;text-align:center;padding-top:4px; letter-spacing: 0.1em;}

/* SWAPPED CONTROLS - Minimalist Wireframe Joystick */
#jzone{position:fixed;bottom:24px;right:24px;width:130px;height:130px;z-index:20;display:none;align-items:center;justify-content:center}
#jbase{width:110px;height:110px;border-radius:50%;background:transparent;border:1px solid rgba(255,255,255,.15);position:relative;touch-action:none}
#jbase::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; border-radius:50%; border:1px dashed rgba(255,255,255,0.1); }
#jhandle{position:absolute;width:30px;height:30px;border-radius:50%;background:var(--cyan);box-shadow:0 0 15px rgba(0,240,255,.4);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

#abtns{position:fixed;bottom:24px;left:24px;display:none;flex-direction:column;gap:14px;z-index:20}
.abtn{
  width:64px;height:64px;border:1px solid;font-family:var(--fmono);font-size:10px;font-weight:700;letter-spacing:.05em;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); touch-action:manipulation; transition:all .1s;
  clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
}
.abtn span{font-size:14px;line-height:1}
#batk{border-color:var(--pink);color:var(--pink);}
#batk:active{background:var(--pink); color:#000;}
#bbst{border-color:var(--yellow);color:var(--yellow);}
#bbst:active{background:var(--yellow); color:#000;}

#bbk{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-family:var(--fmono);font-size:11px;padding:6px 16px;z-index:30;cursor:pointer;display:none;background:#000;border:1px solid var(--cyan);color:var(--cyan);letter-spacing:.15em;touch-action:manipulation}

/* COUNTDOWN OVERLAY */
#countdown-overlay { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; z-index: 150; font-family: var(--fhud); font-size: clamp(60px, 15vw, 120px); font-weight: 900; color: #fff; pointer-events: none; text-align: center; white-space: pre-line; line-height: 1.1; }
.cd-anim { animation: cd-pop 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
@keyframes cd-pop { 0% { transform: scale(0.2); opacity: 0; } 20% { transform: scale(1.1); opacity: 1; } 80% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

/* ROOM MODAL */
#rmodal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
#rmodal.open{opacity:1;pointer-events:all}
.mbox{
  background:#0a0a0c; border:1px solid rgba(0,240,255,.3); padding:32px; width:min(90vw,370px); position:relative;
  clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
}
.mbox h2{font-family:var(--fhud);font-size:20px;letter-spacing:.3em;color:var(--cyan);margin-bottom:24px;text-align:center}
.msec{margin-bottom:20px}
.msec label{display:block;font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.5);margin-bottom:8px;font-family:var(--fmono)}
#rcode{font-family:var(--fmono);font-size:32px;letter-spacing:.4em;color:var(--cyan);text-align:center;padding:14px;border:1px solid rgba(0,240,255,.3);background:#000;display:none;animation:cpulse 1.4s ease-in-out infinite}
@keyframes cpulse{0%,100%{box-shadow:inset 0 0 10px rgba(0,240,255,.1)}50%{box-shadow:inset 0 0 25px rgba(0,240,255,.3)}}
#jinput{width:100%;background:#000;border:1px solid rgba(255,255,255,.2);padding:12px 15px;font-family:var(--fmono);font-size:19px;letter-spacing:.3em;color:#fff;text-transform:uppercase;text-align:center;margin-bottom:10px;outline:none; border-radius:0;}
#jinput:focus{border-color:var(--pink)}
.mdiv{text-align:center;font-family:var(--fmono);color:rgba(255,255,255,.3);font-size:12px;letter-spacing:.2em;margin:16px 0}
#rstat{font-family:var(--fmono);font-size:12px;text-align:center;min-height:18px;margin-top:12px;color:var(--yellow);letter-spacing:.1em}
#closem{position:absolute;top:15px;right:15px;background:none;border:none;color:rgba(255,255,255,.5);font-size:16px;cursor:pointer; transition:0.2s}
#closem:hover{color:var(--pink)}

/* WIN */
#wover{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:300;background:rgba(0,0,0,.95);animation:wfade .5s ease}
@keyframes wfade{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
#wtxt{font-family:var(--fhud);font-size:clamp(35px,10vw,70px);font-weight:900;letter-spacing:.1em;text-align:center; text-transform:uppercase;}
#wsub{font-family:var(--fmono);font-size:13px;letter-spacing:.4em;color:rgba(255,255,255,.5);margin-top:12px;margin-bottom:40px; background:#000; padding:4px 12px; border-left:2px solid;}

@media(max-width:420px){
  .pcard{min-width:95px} #jbase{width:90px;height:90px} .abtn{width:55px;height:55px}
  #ptr-layer { top: 25%; left: 5%; } #ptr-disc { top: 45%; right: 5%; } #ptr-driver { top: 65%; left: 5%; }
}
</style>
</head>
<body>

<div id="flash"></div>
<div class="grid-bg"></div>

<div id="hero-screen" class="screen active">
  <canvas id="hero-canvas"></canvas>
  <div class="hero-title"><h1>BEYBLADE BURST</h1><p>ULTIMATE ARENA</p></div>
  <div id="click-hint">[ TAP TO SHATTER ]</div>
</div>

<div id="parts-screen" class="screen">
  <div id="parts-3d-container"></div>
  
  <div class="pointer-container" id="ptr-layer" onclick="openDetails('layer')">
      <div class="pointer-text">[ LAYER ]</div>
      <div class="pointer-line"></div>
      <div class="pointer-dot"></div>
  </div>
  <div class="pointer-container" id="ptr-disc" onclick="openDetails('disc')">
      <div class="pointer-text" style="color:var(--purple); border-color:var(--purple);">[ DISC ]</div>
      <div class="pointer-line" style="background:var(--purple);"></div>
      <div class="pointer-dot" style="background:var(--purple);"></div>
  </div>
  <div class="pointer-container" id="ptr-driver" onclick="openDetails('driver')">
      <div class="pointer-text" style="color:var(--pink); border-color:var(--pink);">[ DRIVER ]</div>
      <div class="pointer-line" style="background:var(--pink);"></div>
      <div class="pointer-dot" style="background:var(--pink);"></div>
  </div>

  <div id="part-details-panel" class="glass-panel">
      <button id="close-details" onclick="closeDetails()">[ X ]</button>
      <div class="selector-controls">
        <button class="sel-btn" onclick="changePart(-1)">◀</button>
        <div style="display:flex;flex-direction:column;align-items:center;">
            <div class="part-name" id="ui-part-name">STORM PHOENIX</div>
            <div class="element-badge" id="ui-element" style="display:none;">🔥 FIRE</div>
        </div>
        <button class="sel-btn" onclick="changePart(1)">▶</button>
      </div>
      
      <div class="srow"><span class="slabel">ATK</span><div class="sbar"><div class="sfill" id="satk" style="background:var(--pink); width:0%"></div></div></div>
      <div class="srow"><span class="slabel">DEF</span><div class="sbar"><div class="sfill" id="sdef" style="background:var(--cyan); width:0%"></div></div></div>
      <div class="srow"><span class="slabel">STA</span><div class="sbar"><div class="sfill" id="ssta" style="background:#44ff88; width:0%"></div></div></div>
      <div class="srow"><span class="slabel">SPD</span><div class="sbar"><div class="sfill" id="sspd" style="background:var(--yellow); width:0%"></div></div></div>
      <div class="srow"><span class="slabel">WGT</span><div class="sbar"><div class="sfill" id="swgt" style="background:var(--purple); width:0%"></div></div></div>
  </div>

  <div id="parts-btns">
    <button class="nbtn nb-blue" id="btn-arena">ENTER ARENA</button>
    <button class="nbtn nb-gold" id="btn-room-open">MULTIPLAYER</button>
  </div>
</div>

<div id="battle-screen" class="screen">
  <canvas id="battle-canvas"></canvas>
  <div id="bhud">
    <div class="pcard cblue">
      <div class="cname"><span style="color:#fff">YOU</span> <span id="p1-ele">🔥</span></div>
      <div class="blabel">INTEGRITY</div><div class="hpbar"><div class="hpfill" id="p1hp" style="width:100%"></div></div>
      <div class="blabel">RPM</div><div class="spbar"><div class="spfill" id="p1sp" style="width:100%"></div></div>
    </div>
    <div id="timer">3:00</div>
    <div class="pcard cred">
      <div class="cname"><span id="p2-ele">💧</span> <span style="color:#fff">RIVAL</span></div>
      <div class="blabel">INTEGRITY</div><div class="hpbar"><div class="hpfill" id="p2hp" style="width:100%"></div></div>
      <div class="blabel">RPM</div><div class="spbar"><div class="spfill" id="p2sp" style="width:100%"></div></div>
    </div>
  </div>
  
  <div id="abtns">
    <button class="abtn" id="batk"><span style="color:var(--pink)">💥</span>SMASH</button>
    <button class="abtn" id="bbst"><span style="color:var(--yellow)">⚡</span>EVADE</button>
  </div>
  <div id="jzone"><div id="jbase"><div id="jhandle"></div></div></div>
  
  <button id="bbk">[ ESC ] MENU</button>
  <div id="countdown-overlay"></div>
</div>

<div id="rmodal">
  <div class="mbox">
    <button id="closem">✕</button>
    <h2>NETWORK</h2>
    <div class="msec">
      <label>HOST PROTOCOL</label>
      <button class="nbtn nb-blue" id="btn-create" style="width:100%">GENERATE KEY</button>
      <div id="rcode">XXXXX</div>
    </div>
    <div class="mdiv">— OR —</div>
    <div class="msec">
      <label>JOIN PROTOCOL</label>
      <input type="text" id="jinput" placeholder="ENTER KEY" maxlength="5">
      <button class="nbtn" id="btn-join" style="width:100%;color:var(--pink);border-color:var(--pink)">CONNECT</button>
    </div>
    <div id="rstat"></div>
  </div>
</div>

<div id="wover">
  <div id="wtxt">VICTORY</div>
  <div id="wsub" style="border-color:var(--cyan)">BURST FINISH</div>
  <button class="nbtn nb-blue" id="btn-again" style="margin-top: 10px;">REMATCH</button>
  <button class="nbtn" id="btn-wmenu" style="color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.3); margin-top: 10px;">DISCONNECT</button>
</div>

<script>
// ============================================================
// GLOBAL UTILS & AUDIO
// ============================================================
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.min(Math.max(v,a),b);
const lerp=(a,b,t)=>a+(b-a)*t;
const dist=(x1,y1,x2,y2)=>Math.sqrt((x2-x1)**2+(y2-y1)**2);
const rand=(a,b)=>Math.random()*(b-a)+a;

let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function tone(freq,type,dur,gain=.3,delay=0){
  try{const c=getAudio(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.setValueAtTime(freq,c.currentTime+delay);o.frequency.exponentialRampToValueAtTime(freq*.5,c.currentTime+delay+dur);g.gain.setValueAtTime(gain,c.currentTime+delay);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+delay+dur);o.start(c.currentTime+delay);o.stop(c.currentTime+delay+dur);}catch(e){}
}
function noise(dur,gain,lo=800){
  try{const c=getAudio(),len=c.sampleRate*dur,buf=c.createBuffer(1,len,c.sampleRate),d=buf.getChannelData(0);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);const s=c.createBufferSource(),g=c.createGain(),f=c.createBiquadFilter();f.type='lowpass';f.frequency.value=lo;g.gain.setValueAtTime(gain,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);s.buffer=buf;s.connect(f);f.connect(g);g.connect(c.destination);s.start();}catch(e){}
}
function playExplosion(){noise(.45,.9);tone(60,'sine',.45,.55);tone(40,'sine',.65,.4)}
function playClash(){tone(800,'sawtooth',.1,.4);tone(500,'square',.08,.2,.05);tone(200,'sine',.3,.3,.03)}
function playRoll(){tone(180,'sawtooth',.12,.06)}
function flash(col='#ffffff',ms=180){const el=$('flash');el.style.background=col;el.style.opacity='.7';setTimeout(()=>el.style.opacity='0',ms)}

let scr='hero';
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');setTimeout(()=>{if(!s.classList.contains('active'))s.style.display='none'},450)});
  const t=$(`${name}-screen`);
  if(t){t.style.display='flex';requestAnimationFrame(()=>t.classList.add('active'))}
  scr=name;
}

// ============================================================
// ELEMENTS & PARTS DATABASE
// ============================================================

  FIRE:   { name: 'FIRE',   icon: '🔥', col: 0xff003c, hex: '#ff003c', aura: '#ff3366' },

const HC=$('hero-canvas'),hc=HC.getContext('2d');
const H={phase:'rolling',x:-150,y:0,angle:0,spinSpeed:0,radius:65, targetX:0,targetY:0,particles:[],sparkT:0,wobble:0,rollProg:0};
let heroAF=null,heroT0=null;
function resizeHero(){HC.width=innerWidth;HC.height=innerHeight;H.targetX=innerWidth/2;H.targetY=innerHeight/2;H.y=H.targetY}
function heroLoop(ts){
  if(!heroT0)heroT0=ts; const el=(ts-heroT0)/1e3; hc.clearRect(0,0,HC.width,HC.height);
  if(H.phase==='rolling'){ H.rollProg=Math.min(el/1.9,1); const t=H.rollProg,ease=1-Math.pow(1-t,3); H.x=lerp(-H.radius-20,H.targetX,ease); H.y=H.targetY; H.angle+=.19;H.spinSpeed=8; if(H.rollProg>=1){H.phase='waiting';tone(200,'sine',.5,.28);tone(310,'sine',.4,.18,.12)} }
  if(H.phase==='waiting'){ H.x=H.targetX;H.y=H.targetY; if(H.spinSpeed<36)H.spinSpeed+=.45; H.angle+=H.spinSpeed*.055; H.wobble=Math.sin(el*3)*2; H.sparkT++; const rate=Math.max(3,16-Math.floor(H.spinSpeed/5));
    if(H.sparkT%rate===0){ const ea=rand(0,Math.PI*2),ex=H.x+Math.cos(ea)*H.radius,ey=(H.y+H.wobble)+Math.sin(ea)*H.radius; H.particles.push({x:ex,y:ey,vx:Math.cos(ea)*rand(2,6),vy:Math.sin(ea)*rand(2,6)-1,col:Math.random()>.5?'#00f0ff':'#ffffff',life:rand(18,42),ml:42,size:rand(1,3)}); }

  }

  for(const p of H.particles){ p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.vx*=.97;p.vy*=.97;p.life--; hc.save();hc.globalAlpha=p.life/p.ml;hc.fillStyle=p.col;hc.shadowColor=p.col;hc.shadowBlur=5; hc.beginPath();hc.rect(p.x,p.y,p.size,p.size);hc.fill();hc.restore(); }
  if(H.phase!=='exploding'){ hc.save();hc.translate(H.x,H.y+H.wobble); hc.rotate(H.angle); draw2DLayerPath(hc, H.radius, '#00f0ff', 4); hc.beginPath(); hc.arc(0,0,H.radius*.4,0,Math.PI*2); hc.fillStyle='#050505'; hc.fill(); hc.restore(); }

let scene, camera, renderer, beyGroup;
let isDragging = false, previousMousePosition = { x: 0, y: 0 };
let currentLayer = 0, currentDisc = 0, currentDriver = 0;
let meshLayer, meshDisc, meshDriver;
let customizerAF;
let activeEditorType = null;

function init3DPartsScreen() {
  showScreen('parts');
  const container = $('parts-3d-container');
  if(!scene) {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 12); camera.lookAt(0, 0, 0);
    renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
    const pl = new THREE.PointLight(0x00f0ff, 1.2); pl.position.set(5, 5, 5); scene.add(pl);
    const bl = new THREE.PointLight(0xff003c, 0.8); bl.position.set(-5, -5, -5); scene.add(bl);

    beyGroup = new THREE.Group(); scene.add(beyGroup);
    meshLayer = new THREE.Mesh(DB.layers[0].geo, new THREE.MeshPhongMaterial({ shininess: 80, transparent: true, opacity: 0.9 })); meshLayer.position.y = 1.0; beyGroup.add(meshLayer);
    meshDisc = new THREE.Mesh(DB.discs[0].geo, new THREE.MeshPhongMaterial({ color: 0x555555, emissive: 0x111111, shininess: 120 })); meshDisc.position.y = 0.2; beyGroup.add(meshDisc);
    meshDriver = new THREE.Mesh(DB.drivers[0].geo, new THREE.MeshPhongMaterial({ color: 0x222222, emissive: 0x0a0a0a, shininess: 40 })); meshDriver.position.y = -0.8; beyGroup.add(meshDriver);

    const handleMove = (dx, dy) => { beyGroup.rotation.y += dx * 0.01; beyGroup.rotation.x += dy * 0.01; };
    container.addEventListener('mousedown', e => { isDragging = true; previousMousePosition = { x: e.offsetX, y: e.offsetY }; closeDetails(); });
    container.addEventListener('mousemove', e => { if(isDragging) { handleMove(e.offsetX - previousMousePosition.x, e.offsetY - previousMousePosition.y); previousMousePosition = { x: e.offsetX, y: e.offsetY }; } });
    window.addEventListener('mouseup', () => { isDragging = false; });
    container.addEventListener('touchstart', e => { isDragging = true; previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY }; });
    container.addEventListener('touchmove', e => { if(isDragging) { handleMove(e.touches[0].clientX - previousMousePosition.x, e.touches[0].clientY - previousMousePosition.y); previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY }; } });
    window.addEventListener('touchend', () => { isDragging = false; });
    window.addEventListener('resize', () => { if(scr==='parts' && camera) { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); } });
  }

  beyGroup.position.y = 15; beyGroup.rotation.set(0.5, 0, 0);
  setTimeout(() => { 
    $('ptr-layer').style.opacity = 1; $('ptr-disc').style.opacity = 1; $('ptr-driver').style.opacity = 1;
    $('parts-btns').classList.add('vis'); 
    update3DParts(); 
  }, 500);

  function animate3D() {
    if(scr !== 'parts') return;
    customizerAF = requestAnimationFrame(animate3D);
    if(beyGroup.position.y > 0) beyGroup.position.y = lerp(beyGroup.position.y, 0, 0.1);
    if(!isDragging) { beyGroup.rotation.y += 0.01; beyGroup.rotation.x = lerp(beyGroup.rotation.x, 0.6, 0.02); }
    renderer.render(scene, camera);
  }
  animate3D();
}

function openDetails(type) {
  getAudio(); tone(600, 'sine', 0.1, 0.1);
  activeEditorType = type;
  $('part-details-panel').classList.add('open');
  updateUIForActivePart();
}

function closeDetails() {
  if($('part-details-panel').classList.contains('open')) {
     $('part-details-panel').classList.remove('open');
  }
}

function changePart(dir) {
  tone(440,'sine',.1,.2);
  if(activeEditorType === 'layer') currentLayer = (currentLayer + dir + DB.layers.length) % DB.layers.length;
  else if (activeEditorType === 'disc') currentDisc = (currentDisc + dir + DB.discs.length) % DB.discs.length;
  else if (activeEditorType === 'driver') currentDriver = (currentDriver + dir + DB.drivers.length) % DB.drivers.length;
  beyGroup.rotation.y += (dir * 0.5); 
  update3DParts(); updateUIForActivePart();
}

function updateUIForActivePart() {
  let item;
  if(activeEditorType === 'layer') item = DB.layers[currentLayer];
  else if (activeEditorType === 'disc') item = DB.discs[currentDisc];
  else if (activeEditorType === 'driver') item = DB.drivers[currentDriver];
  if(!item) return;

  $('ui-part-name').textContent = item.name;
  if(item.type) {
      $('ui-element').style.display = 'inline-block';
      $('ui-element').textContent = item.type.icon + ' ' + item.type.name;
      $('ui-element').style.color = item.type.hex;
      $('ui-element').style.borderColor = item.type.hex;
  } else {
      $('ui-element').style.display = 'none';
  }

  $('satk').style.width = clamp((item.stats.atk / 50) * 100, 0, 100) + '%';
  $('sdef').style.width = clamp((item.stats.def / 50) * 100, 0, 100) + '%';
  $('ssta').style.width = clamp((item.stats.sta / 50) * 100, 0, 100) + '%';
  $('sspd').style.width = clamp((item.stats.spd / 50) * 100, 0, 100) + '%';
  $('swgt').style.width = clamp((item.stats.wgt / 50) * 100, 0, 100) + '%';
}

function calcTotalStats(l, d, r) {
  return { atk: l.stats.atk + d.stats.atk + r.stats.atk, def: l.stats.def + d.stats.def + r.stats.def, sta: l.stats.sta + d.stats.sta + r.stats.sta, spd: l.stats.spd + d.stats.spd + r.stats.spd, wgt: l.stats.wgt + d.stats.wgt + r.stats.wgt };
}

function update3DParts() {
  const L = DB.layers[currentLayer]; const D = DB.discs[currentDisc]; const R = DB.drivers[currentDriver];
  meshLayer.geometry = L.geo; meshLayer.material.color.setHex(L.type.col); meshLayer.material.emissive.setHex(0x1a1a1a);
  meshDisc.geometry = D.geo; meshDriver.geometry = R.geo;
}

// BATTLE ARENA PHYSICS & RENDER
// ============================================================
const BC=$('battle-canvas'),bc=BC.getContext('2d');
let battleAF=null,battleRun=false;
const AR=162, BR=22, FRIC=.984, GDUR=180; 

const G={
  p:{ x:0, y:82, vx:0, vy:0, angle:0, sp:50, hp:100, buff:0, boost:false, build:{}, stats:{}, trail:[] },
  o:{ x:0, y:-82, vx:0, vy:0, angle:0, sp:50, hp:100, buff:0, aiMode:'chase', build:{}, stats:{}, trail:[] },
  sparks:[], time:GDUR, over:false, winner:null, countdown:false, scale:1, cx:0, cy:0, lt:0, roomMode:false
};

const JOY={on:false,id:null,dx:0,dy:0};
function resizeBattle(){ BC.width=innerWidth; BC.height=innerHeight; G.scale=Math.min(innerWidth,innerHeight)/(AR*2.8); G.cx=innerWidth/2; G.cy=innerHeight/2; }
function gS(gx,gy){return[G.cx+gx*G.scale,G.cy+gy*G.scale]}

function setBuild(target, lIdx, dIdx, rIdx) {
  const L = DB.layers[lIdx], D = DB.discs[dIdx], R = DB.drivers[rIdx];
  target.build = { l: lIdx, d: dIdx, r: rIdx, elem: L.type }; target.stats = calcTotalStats(L, D, R);
  target.maxSp = 3.5 + (target.stats.spd / 100) * 3; 
  target.sDecay = 0.015 - (target.stats.sta / 100) * 0.008; 
  target.mass = 1 + (target.stats.wgt / 100) * 1.5;
}

function resetGame(){
  G.p.x=0; G.p.y=82; G.p.vx=0; G.p.vy=0; G.p.hp=100; G.p.sp=50; G.p.buff=0; G.p.trail=[]; 
  setBuild(G.p, currentLayer, currentDisc, currentDriver);
  
  G.o.x=0; G.o.y=-82; G.o.vx=0; G.o.vy=0; G.o.hp=100; G.o.sp=50; G.o.buff=0; G.o.trail=[]; G.o.aiMode='chase';
  
  if(G.roomMode && opponentBuildData) {
      setBuild(G.o, opponentBuildData.l, opponentBuildData.d, opponentBuildData.r);
  } else {
      setBuild(G.o, Math.floor(Math.random()*6), Math.floor(Math.random()*6), Math.floor(Math.random()*6));
  }
  
  $('p1-ele').textContent = G.p.build.elem.icon; $('p2-ele').textContent = G.o.build.elem.icon;
  $('p1hp').style.background = G.p.build.elem.hex;
  $('p2hp').style.background = G.o.build.elem.hex;
  G.sparks=[]; G.time=GDUR; G.over=false; G.countdown=false;
}

async function runCountdown() {
  G.countdown = true; const el = $('countdown-overlay'); el.style.display = 'flex';
  const steps = ['3', '2', '1', 'LET IT\nRIP!'];
  for (let i = 0; i < steps.length; i++) {
    el.textContent = steps[i]; el.classList.remove('cd-anim'); void el.offsetWidth; el.classList.add('cd-anim');
    if (i < 3) { tone(440, 'square', 0.15, 0.4); el.style.color = 'var(--yellow)'; el.style.textShadow = '0 0 20px rgba(252,238,10,0.8)'; } 
    else { tone(880, 'square', 0.4, 0.5); el.style.color = 'var(--cyan)'; el.style.textShadow = '0 0 20px rgba(0,240,255,0.8)'; }
    await new Promise(r => setTimeout(r, 1000));
  }
  el.style.display = 'none'; G.countdown = false;
}

function startBattle(){
  showScreen('battle'); resizeBattle(); resetGame();
  if(customizerAF) cancelAnimationFrame(customizerAF);
  closeDetails(); $('parts-btns').classList.remove('vis');
  $('jzone').style.display='flex'; $('abtns').style.display='flex'; $('bbk').style.display='block'; $('wover').style.display='none';
  battleRun=true; if(battleAF)cancelAnimationFrame(battleAF);
  G.lt=performance.now(); battleAF=requestAnimationFrame(bLoop); runCountdown(); 
}

function bLoop(ts){ const dt=Math.min((ts-G.lt)/1e3,.05);G.lt=ts; if(!G.over)updateGame(dt); renderGame(); if(battleRun)battleAF=requestAnimationFrame(bLoop); }

function processPhysics(b, ax, ay) {
  b.vx += ax; b.vy += ay;
  const pm = b.boost ? b.maxSp * 1.8 : b.maxSp;
  if(b.boost && b.sp > 0) b.sp -= 0.1;

  const ps = Math.sqrt(b.vx**2 + b.vy**2);
  if(ps > pm) { b.vx = (b.vx/ps)*pm; b.vy = (b.vy/ps)*pm; }
  b.vx *= FRIC; b.vy *= FRIC; b.x += b.vx; b.y += b.vy;
  
  b.angle += b.sp * 0.05; b.sp = Math.max(0, b.sp - b.sDecay); 
  if(b.buff > 0) b.buff--;
  
  if(Math.random() < (b.sp/40)) { const[sx,sy]=gS(b.x,b.y); b.trail.push({x:sx, y:sy, life: 1.0}); if(b.trail.length > 20) b.trail.shift(); }
}

function updateGame(dt){
  if(G.countdown) { G.p.angle += G.p.sp * 0.05; G.o.angle -= G.o.sp * 0.05; G.p.boost = false; return; }
  G.time-=dt; let ax=0, ay=0;
  if(JOY.on){const m=Math.sqrt(JOY.dx**2+JOY.dy**2);if(m>0){ax=JOY.dx/m*.5;ay=JOY.dy/m*.5;}}
  if(G.p.boost){ax*=1.5;ay*=1.5;} processPhysics(G.p, ax, ay);
  
  if(!G.roomMode) { updateAI(); processPhysics(G.o, G.o.ax, G.o.ay); }
  
  boundary(G.p,'player'); boundary(G.o,'opponent'); collision();
  G.p.hp=clamp(G.p.hp,0,100); G.o.hp=clamp(G.o.hp,0,100);
  if(G.p.sp<=0||G.p.hp<=0){endGame('opponent');return} if(G.o.sp<=0||G.o.hp<=0){endGame('player');return}
  if(G.time<=0){endGame(G.p.hp>G.o.hp?'player':'opponent');return}
  
  $('p1hp').style.width=G.p.hp+'%'; $('p1sp').style.width=(G.p.sp/50*100)+'%'; $('p2hp').style.width=G.o.hp+'%'; $('p2sp').style.width=(G.o.sp/50*100)+'%';
  const m=Math.floor(G.time/60),s=Math.floor(G.time%60);$('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
}

function boundary(b,role){
  const lim=AR-BR,d=Math.sqrt(b.x**2+b.y**2);
  if(d>lim){
    if(d>AR+BR){endGame(role==='player'?'opponent':'player');return}
    const nx=b.x/d,ny=b.y/d,dot=b.vx*nx+b.vy*ny;
    if(dot>0){b.vx-=2.3*dot*nx;b.vy-=2.3*dot*ny}
    b.x=nx*lim;b.y=ny*lim;b.hp-=2.5; bSparks(gS(b.x,b.y)[0], gS(b.x,b.y)[1], 7, b.build.elem.hex);
    if(role==='player'&&navigator.vibrate)navigator.vibrate(25);
  }
}

function collision(){
  const p=G.p, o=G.o, dx=p.x-o.x, dy=p.y-o.y, cd=Math.sqrt(dx**2+dy**2), md=BR*2;
  if(cd<md && cd>.01){
    const nx=dx/cd, ny=dy/cd, rv=(p.vx-o.vx)*nx+(p.vy-o.vy)*ny;
    if(rv<0){
      let pAtk = p.stats.atk * (p.buff > 0 ? 2 : 1); let oAtk = o.stats.atk * (o.buff > 0 ? 2 : 1);
      let pDef = p.stats.def * (p.boost ? 0.5 : 1); let oDef = o.stats.def * (o.boost ? 0.5 : 1);
      const pForce = (pAtk / oDef) * p.mass; const oForce = (oAtk / pDef) * o.mass; const imp = -rv * 1.5;
      
      p.vx += imp * nx * (oForce / p.mass); p.vy += imp * ny * (oForce / p.mass); 
      o.vx -= imp * nx * (pForce / o.mass); o.vy -= imp * ny * (pForce / o.mass);
      
      p.hp -= Math.abs(rv) * oForce * 0.8; o.hp -= Math.abs(rv) * pForce * 0.8; 
      p.sp -= Math.abs(rv) * 0.4; o.sp -= Math.abs(rv) * 0.4;
      
      const mx=G.cx+(p.x+o.x)*.5*G.scale, my=G.cy+(p.y+o.y)*.5*G.scale;
      bSparks(mx,my, 15, p.build.elem.hex); bSparks(mx,my, 15, o.build.elem.hex); playClash(); flash('rgba(255,255,255,.2)',90); if(navigator.vibrate)navigator.vibrate([45,15,45]);
    }
    const ov=md-cd; p.x+=nx*ov*.62; p.y+=ny*ov*.62; o.x-=nx*ov*.38; o.y-=ny*ov*.38;
  }
}

function updateAI(){
  const o=G.o, p=G.p; o.aiT++; if(o.aiT%130===0){const r=Math.random();o.aiMode=r<.52?'chase':r<.76?'circle':'retreat'}
  const dx=p.x-o.x, dy=p.y-o.y, d=Math.sqrt(dx**2+dy**2), dc=Math.sqrt(o.x**2+o.y**2); o.ax = 0; o.ay = 0;
  if(dc>AR*.72){o.ax-=o.x/dc*.3; o.ay-=o.y/dc*.3}
  const ac=.25 * (o.stats.spd/50);
  if(o.aiMode==='chase'&&d>4){o.ax+=dx/d*ac; o.ay+=dy/d*ac} else if(o.aiMode==='circle'){o.ax+=(-dy/d)*ac; o.ay+=(dx/d)*ac} else{if(d>.01){o.ax-=dx/d*ac*.5; o.ay-=dy/d*ac*.5}}
  if(d < 50 && Math.random() < 0.01 && o.sp > 15 && o.buff === 0) { o.sp -= 4; o.buff = 90; o.vx += dx/d*6; o.vy += dy/d*6; }
}

function bSparks(sx,sy,n,col){ for(let i=0;i<n;i++){ const a=rand(0,Math.PI*2), sp=rand(1.2,6.5); G.sparks.push({x:sx, y:sy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, col, life:rand(15,35), size:rand(1,3)}) } }

function draw2DLayerPath(ctx, r, col, typeIdx) {
  ctx.beginPath();
  if(typeIdx === 0 || typeIdx === 3) { const blades = typeIdx === 0 ? 4 : 3; for(let i=0; i<blades; i++) { ctx.rotate(Math.PI*2/blades); ctx.moveTo(0,-r*.12); ctx.bezierCurveTo(r*.42,-r*.46,r*.97,-r*.29,r,0); ctx.bezierCurveTo(r*.92,r*.23,r*.36,r*.13,0,r*.12); } } 
  else if (typeIdx === 1 || typeIdx === 2) { const sides = typeIdx === 1 ? 16 : 6; for(let i=0; i<=sides; i++) { const a = (i/sides)*Math.PI*2; i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); } } 
  else { const blades = typeIdx === 4 ? 8 : 5; for(let i=0; i<blades; i++) { ctx.rotate(Math.PI*2/blades); ctx.moveTo(0,-r*.2); ctx.lineTo(r, 0); ctx.lineTo(r*.5, r*.3); } }
  ctx.closePath(); ctx.fillStyle = col + '55'; ctx.fill(); ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.stroke();
}
function draw2DDiscPath(ctx, r, typeIdx) {
  ctx.beginPath(); const sides = (typeIdx === 0) ? 4 : (typeIdx === 2 ? 8 : 12);
  for(let i=0; i<=sides; i++) { const a = (i/sides)*Math.PI*2; const rad = (typeIdx===0 && i%2!==0) ? r*.6 : r; i===0 ? ctx.moveTo(Math.cos(a)*rad, Math.sin(a)*rad) : ctx.lineTo(Math.cos(a)*rad, Math.sin(a)*rad); }
  ctx.closePath(); ctx.fillStyle = '#222'; ctx.fill(); ctx.strokeStyle = '#555'; ctx.lineWidth = 1; ctx.stroke();
}
function drawCustomBey(ctx, r, build) {
  const hex = build.elem.hex; ctx.shadowColor = hex; ctx.shadowBlur = 10; draw2DLayerPath(ctx, r, hex, build.l); draw2DDiscPath(ctx, r*.6, build.d);
  ctx.beginPath(); ctx.arc(0,0,r*.2,0,Math.PI*2); ctx.fillStyle = '#050505'; ctx.fill(); ctx.strokeStyle = hex; ctx.lineWidth = 2; ctx.stroke();
}
function drawAura(ctx, x, y, r, bey) {
  if (bey.sp < 10) return; const time = Date.now() / 150; 
  const pulse = Math.sin(time * 2) * (bey.buff > 0 ? 15 : 5); const size = r * 1.5 + pulse;
  ctx.save(); ctx.translate(x, y); const g = ctx.createRadialGradient(0,0,r*.8, 0,0,size); 
  g.addColorStop(0, bey.build.elem.aura + (bey.buff > 0 ? 'cc' : '66')); g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  for (let i = 0; i <= 32; i++) { const a = (i / 32) * Math.PI * 2; let offset = Math.sin(a * 8 + time) * (bey.build.elem.name === 'ENERGY' || bey.build.elem.name === 'FIRE' ? 8 : 3); const px = Math.cos(a) * (size + offset); const py = Math.sin(a) * (size + offset); i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); }
  ctx.closePath(); ctx.fillStyle = g; ctx.fill(); ctx.restore();
}
function drawTrail(ctx, bey, r) {
  if (bey.trail.length < 2) return; const hex = bey.build.elem.hex; const type = bey.build.elem.name;
  for(let i=0; i<bey.trail.length; i++) {
    const t = bey.trail[i]; t.life -= 0.05; if(t.life <= 0) continue;
    ctx.save(); ctx.translate(t.x, t.y); ctx.globalAlpha = t.life; ctx.fillStyle = hex; ctx.shadowColor = hex; ctx.shadowBlur = 10; ctx.beginPath();
    if(type === 'WATER') { ctx.rect(-r*.1,-r*.1,r*.2,r*.2); } else if(type === 'FIRE') { ctx.moveTo(0,-r*.3); ctx.lineTo(r*.2,r*.2); ctx.lineTo(-r*.2,r*.2); }
    else if(type === 'PLANT') { ctx.ellipse(0,0,r*.3,r*.1,Date.now()/100+i,0,Math.PI*2); } else if(type === 'GROUND') { ctx.rect(-r*.15, -r*.15, r*.3, r*.3); } else { ctx.arc(0,0,r*(0.15),0,Math.PI*2); }
    ctx.fill(); ctx.restore();
  }
  bey.trail = bey.trail.filter(t => t.life > 0);
}

function renderGame(){
  const W=BC.width, Ht=BC.height; bc.clearRect(0,0,W,Ht); const cx=G.cx, cy=G.cy, sc=G.scale, arR=AR*sc;
  
  // MINIMALIST ARENA
  bc.beginPath();bc.arc(cx,cy,arR,0,Math.PI*2);bc.fillStyle='#0a0a0c';bc.fill();
  bc.save();bc.beginPath();bc.arc(cx,cy,arR,0,Math.PI*2);bc.clip(); bc.strokeStyle='rgba(0,240,255,.05)';bc.lineWidth=1;
  const gs=40*sc; for(let x=cx-arR;x<cx+arR;x+=gs){bc.beginPath();bc.moveTo(x,cy-arR);bc.lineTo(x,cy+arR);bc.stroke()} for(let y=cy-arR;y<cy+arR;y+=gs){bc.beginPath();bc.moveTo(cx-arR,y);bc.lineTo(cx+arR,y);bc.stroke()} bc.restore();
  
  bc.save();bc.shadowColor='var(--cyan)';bc.shadowBlur=15; bc.beginPath();bc.arc(cx,cy,arR,0,Math.PI*2);bc.strokeStyle='var(--cyan)';bc.lineWidth=2;bc.stroke(); bc.restore();
  
  const beyR=BR*sc; const[psx,psy]=gS(G.p.x,G.p.y), [osx,osy]=gS(G.o.x,G.o.y);
  drawTrail(bc, G.o, beyR); drawTrail(bc, G.p, beyR); drawAura(bc, osx, osy, beyR, G.o); drawAura(bc, psx, psy, beyR, G.p);
  
  bc.save(); bc.translate(osx,osy); if(G.o.sp>8){for(let g=3;g>0;g--){bc.save();bc.globalAlpha=.05*g;bc.rotate(G.o.angle+g*.32);drawCustomBey(bc,beyR,G.o.build);bc.restore()}} bc.rotate(G.o.angle); drawCustomBey(bc,beyR,G.o.build); bc.restore();
  bc.save(); bc.translate(psx,psy); if(G.p.sp>8){for(let g=3;g>0;g--){bc.save();bc.globalAlpha=.05*g;bc.rotate(G.p.angle-g*.32);drawCustomBey(bc,beyR,G.p.build);bc.restore()}} bc.rotate(G.p.angle); drawCustomBey(bc,beyR,G.p.build); bc.restore();
  
  G.sparks=G.sparks.filter(s=>s.life>0);
  for(const s of G.sparks){ s.x+=s.vx; s.y+=s.vy; s.vx*=.92; s.vy*=.92; s.vy+=.1; s.life--; bc.save(); bc.globalAlpha=s.life/35; bc.fillStyle=s.col; bc.shadowColor=s.col; bc.shadowBlur=7; bc.beginPath(); bc.rect(s.x,s.y,s.size*1.5,s.size*1.5); bc.fill(); bc.restore(); }
  if(G.over){bc.fillStyle='rgba(0,0,0,.7)';bc.fillRect(0,0,W,Ht)}
}

function endGame(winner){
  G.over=true; G.winner=winner; battleRun=false; const win=winner==='player'; const ft=win?(G.o.sp<=0?'BURST FINISH':'RING OUT'):(G.p.sp<=0?'BURST FINISH':'RING OUT');
  flash(win?G.p.build.elem.hex:G.o.build.elem.hex,600); playExplosion(); const[wx,wy]=gS(win?G.p.x:G.o.x,win?G.p.y:G.o.y);
  bSparks(wx,wy,55,win?G.p.build.elem.hex:G.o.build.elem.hex); bSparks(wx,wy,28,'#fff');
  if(battleAF)cancelAnimationFrame(battleAF); renderGame();
  setTimeout(()=>{
    const wo=$('wover'),wt=$('wtxt'),ws=$('wsub'); wt.textContent=win?'VICTORY':'DEFEATED'; wt.className=win?'win':'lose';
    wt.style.color = win ? G.p.build.elem.hex : G.o.build.elem.hex; wt.style.textShadow = `3px 0 #fff`;
    ws.textContent=ft; ws.style.borderColor = win ? G.p.build.elem.hex : G.o.build.elem.hex; wo.style.display='flex';
  },850);
}

// Controls
const jb=$('jbase'),jh=$('jhandle'),jRad=50; function jCenter(){const r=jb.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}
function updateJoy(cx,cy){ const c=jCenter();let dx=cx-c.x,dy=cy-c.y; const m=Math.sqrt(dx**2+dy**2);if(m>jRad){dx=dx/m*jRad;dy=dy/m*jRad} JOY.dx=dx/jRad;JOY.dy=dy/jRad; jh.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;}
function resetJoy(){JOY.on=false;JOY.dx=0;JOY.dy=0;jh.style.transform='translate(-50%,-50%)'}
jb.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];JOY.on=true;JOY.id=t.identifier;updateJoy(t.clientX,t.clientY)},{passive:false});
document.addEventListener('touchmove',e=>{if(!JOY.on)return;for(const t of e.changedTouches)if(t.identifier===JOY.id){e.preventDefault();updateJoy(t.clientX,t.clientY);break}},{passive:false});
document.addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===JOY.id){resetJoy();break}});
jb.addEventListener('mousedown',e=>{JOY.on=true;updateJoy(e.clientX,e.clientY)}); document.addEventListener('mousemove',e=>{if(!JOY.on)return;updateJoy(e.clientX,e.clientY)}); document.addEventListener('mouseup',()=>{if(JOY.on)resetJoy()});

function doAttack(){
  if(G.countdown || G.p.buff > 0 || G.p.sp < 5) return; 
  G.p.sp -= 4; G.p.buff = 90; 
  const o=G.o, p=G.p; const dx=o.x-p.x,dy=o.y-p.y,d=Math.sqrt(dx**2+dy**2); 
  if(d>0){p.vx+=dx/d*6;p.vy+=dy/d*6} tone(320,'sawtooth',.22,.32);if(navigator.vibrate)navigator.vibrate(38);
}

$('batk').addEventListener('touchstart',e=>{e.preventDefault();doAttack()},{passive:false}); $('batk').addEventListener('mousedown',doAttack);
$('bbst').addEventListener('touchstart',e=>{e.preventDefault(); if(!G.countdown) G.p.boost=true},{passive:false}); $('bbst').addEventListener('mousedown',()=> { if(!G.countdown) G.p.boost=true });
$('bbst').addEventListener('touchend',()=>G.p.boost=false); $('bbst').addEventListener('mouseup',()=>G.p.boost=false);

document.addEventListener('keydown',e=>{ if(scr==='battle'){ if(e.key==='ArrowLeft'||e.key==='a'){JOY.on=true;JOY.dx=-1;JOY.dy=0} if(e.key==='ArrowRight'||e.key==='d'){JOY.on=true;JOY.dx=1;JOY.dy=0} if(e.key==='ArrowUp'||e.key==='w'){JOY.on=true;JOY.dx=0;JOY.dy=-1} if(e.key==='ArrowDown'||e.key==='s'){JOY.on=true;JOY.dx=0;JOY.dy=1} if(e.key===' '){e.preventDefault();doAttack()} if(e.key==='Shift') { if(!G.countdown) G.p.boost=true; } }});
document.addEventListener('keyup',e=>{ if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','a','d','w','s'].includes(e.key))resetJoy(); if(e.key==='Shift')G.p.boost=false;});

// ============================================================
// REAL MULTIPLAYER (PEERJS)
// ============================================================
let peer = null, conn = null, roomRole = null, roomCode = null; let opponentBuildData = null; const PREFIX = 'beycyber-v1-';
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<5;i++)s+=c[Math.floor(Math.random()*c.length)];return s}
$('btn-room-open').addEventListener('click',()=>$('rmodal').classList.add('open')); $('closem').addEventListener('click',()=>$('rmodal').classList.remove('open'));

$('btn-create').addEventListener('click', () => {
  getAudio(); roomCode = genCode(); $('rcode').textContent = roomCode; $('rcode').style.display = 'block'; roomRole = 'host'; $('rstat').textContent = 'INITIALIZING PROTOCOL...';
  if(peer) peer.destroy(); peer = new Peer(PREFIX + roomCode);
  peer.on('open', () => { $('rstat').textContent = 'WAITING FOR CONNECTION...'; $('rstat').style.color='var(--cyan)'; });
  peer.on('connection', (connection) => { conn = connection; setupConnection(); });
  peer.on('error', (err) => { $('rstat').textContent = 'ERROR: ' + err.type; $('rstat').style.color = 'var(--pink)'; });
});

$('btn-join').addEventListener('click', () => {
  getAudio(); const code = $('jinput').value.trim().toUpperCase();
  if(code.length !== 5){$('rstat').textContent = 'INVALID KEY'; $('rstat').style.color='var(--pink)'; return}
  roomRole = 'guest'; roomCode = code; $('rstat').textContent = 'CONNECTING...'; $('rstat').style.color='var(--cyan)';
  if(peer) peer.destroy(); peer = new Peer(); 
  peer.on('open', () => { conn = peer.connect(PREFIX + code); conn.on('open', () => { setupConnection(); conn.send({ type: 'handshake', build: { l: currentLayer, d: currentDisc, r: currentDriver } }); }); });
  peer.on('error', () => { $('rstat').textContent = 'NETWORK NOT FOUND'; $('rstat').style.color = 'var(--pink)'; });
});

function setupConnection() {
  conn.on('data', (data) => {
      if (data.type === 'handshake') { opponentBuildData = data.build; if (roomRole === 'host') { conn.send({ type: 'start_game', build: { l: currentLayer, d: currentDisc, r: currentDriver } }); launchMultiplayerGame(); } } 
      else if (data.type === 'start_game') { opponentBuildData = data.build; launchMultiplayerGame(); } 
      else if (data.type === 'state' && G.roomMode && !G.countdown) { const s = data.s; G.o.x = -s.x; G.o.y = -s.y; G.o.vx = -s.vx; G.o.vy = -s.vy; G.o.angle = s.angle; G.o.hp = s.hp; G.o.sp = s.sp; G.o.buff = s.buff; G.o.boost = s.boost; } 
      else if (data.type === 'play_again') { $('wover').style.display='none'; resetGame(); G.over=false; battleRun=true; G.lt=performance.now(); battleAF=requestAnimationFrame(bLoop); runCountdown(); }
  });
}

function launchMultiplayerGame() {
  $('rstat').textContent = 'CONNECTION SECURED'; $('rstat').style.color = 'var(--cyan)'; tone(440,'sine',.2,.3); tone(550,'sine',.2,.3,.14);
  setTimeout(() => { $('rmodal').classList.remove('open'); G.roomMode = true; startBattle(); }, 1100);
}

setInterval(() => { if(conn && conn.open && G.roomMode && !G.over && !G.countdown){ conn.send({type:'state', s:{x:G.p.x, y:G.p.y, vx:G.p.vx, vy:G.p.vy, angle:G.p.angle, hp:G.p.hp, sp:G.p.sp, buff:G.p.buff, boost:G.p.boost}}); } }, 48);

$('btn-arena').addEventListener('click',()=>{getAudio(); G.roomMode=false; startBattle()});
$('btn-again').addEventListener('click',()=>{ if(conn && conn.open) conn.send({type: 'play_again'}); $('wover').style.display='none';resetGame();G.over=false;battleRun=true;G.lt=performance.now();battleAF=requestAnimationFrame(bLoop);runCountdown(); });
$('btn-wmenu').addEventListener('click',()=>{ if(peer) { peer.destroy(); peer = null; conn = null; } $('wover').style.display='none';battleRun=false;if(battleAF)cancelAnimationFrame(battleAF); $('jzone').style.display='none';$('abtns').style.display='none';$('bbk').style.display='none';$('countdown-overlay').style.display='none'; H.phase='rolling';H.x=-H.radius-20;H.particles=[];heroT0=null; showScreen('hero');heroAF=requestAnimationFrame(heroLoop); });
$('bbk').addEventListener('click',()=>{ if(peer) { peer.destroy(); peer = null; conn = null; } battleRun=false;if(battleAF)cancelAnimationFrame(battleAF); $('jzone').style.display='none';$('abtns').style.display='none';$('bbk').style.display='none';$('wover').style.display='none';$('countdown-overlay').style.display='none'; init3DPartsScreen(); });

window.addEventListener('load',()=>{ resizeHero();H.phase='rolling';H.x=-H.radius-20;heroT0=null; heroAF=requestAnimationFrame(heroLoop); setInterval(()=>{if(H.phase==='waiting'&&H.spinSpeed>10)playRoll()},800); });
</script>
